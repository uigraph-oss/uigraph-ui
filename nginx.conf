server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Same-origin reverse proxy to the backend API (src/env.ts resolves
    # VITE_API_URL to `${window.location.origin}/api`).
    location /api/ {
        proxy_pass http://uigraph-api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Same-origin reverse proxy to the GraphQL server (src/env.ts resolves
    # VITE_GRAPHQL_URL to `${window.location.origin}/graphql`).
    location /graphql {
        proxy_pass http://uigraph-graphql:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # No-cache for index.html so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Long-lived cache for hashed JS/CSS/asset bundles
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all unmatched routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
